<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tell us about your event — Together Out Loud</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { margin:0; background:#F1ECE3; font-family:'Inter',sans-serif; color:#2A2620; display:flex; justify-content:center; padding:40px 16px; }
    .wrap { max-width:480px; width:100%; }
    h1 { font-family:'Fraunces',serif; font-size:26px; margin:0 0 6px; }
    p.sub { color:#8A8578; margin:0 0 26px; font-size:14px; }
    .card { background:#FBF9F5; border-radius:12px; padding:24px; box-shadow:0 1px 2px rgba(0,0,0,0.05); }
    label { display:block; font-size:12px; color:#8A8578; margin:14px 0 4px; }
    input, select { width:100%; padding:10px 12px; border:1px solid #DDD5C4; border-radius:7px; font-size:14px; font-family:inherit; background:#fff; }
    .row-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    button { margin-top:20px; width:100%; background:#C98B3D; color:#1B1F2A; border:none; padding:12px; border-radius:8px; font-weight:600; font-size:14px; cursor:pointer; font-family:inherit; }
    button:disabled { opacity:0.5; cursor:not-allowed; }
    .done { display:none; text-align:center; padding:20px 0; }
    .done h2 { font-family:'Fraunces',serif; }
    .error { color:#B6752C; font-size:13px; margin-top:10px; display:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Together Out Loud</h1>
    <p class="sub">Tell us a bit about your event and we'll get back to you with a quotation.</p>
    <div class="card">
      <form id="leadForm">
        <label>Your name / organisation</label>
        <input id="name" required placeholder="e.g. Priya & Raj Sharma" />

        <div class="row-2">
          <div>
            <label>Phone</label>
            <input id="phone" placeholder="+91 ..." />
          </div>
          <div>
            <label>Email</label>
            <input id="email" type="email" placeholder="name@example.com" />
          </div>
        </div>

        <label>What experience are you looking for?</label>
        <select id="eventType"></select>

        <div class="row-2">
          <div>
            <label>City</label>
            <input id="city" placeholder="e.g. Siliguri" />
          </div>
          <div>
            <label>Event date</label>
            <input id="date" type="date" required />
          </div>
        </div>

        <label>Rough budget (optional)</label>
        <input id="budget" placeholder="e.g. 90000" />

        <button type="submit" id="submitBtn">Send query</button>
        <div class="error" id="errorMsg"></div>
      </form>
      <div class="done" id="doneMsg">
        <h2>Thank you 🙏</h2>
        <p>We've received your query and will be in touch shortly with a quotation.</p>
      </div>
    </div>
  </div>

  <script>
    const eventTypeSelect = document.getElementById("eventType");

    fetch("/api/config").then(r => r.json()).then(cfg => {
      eventTypeSelect.innerHTML = cfg.packages.map(p => `<option value="${p.id}">${p.name}</option>`).join("");
    });

    document.getElementById("leadForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submitBtn");
      const errorMsg = document.getElementById("errorMsg");
      errorMsg.style.display = "none";
      btn.disabled = true;
      btn.textContent = "Sending…";

      const payload = {
        name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        email: document.getElementById("email").value,
        eventType: eventTypeSelect.value,
        city: document.getElementById("city").value,
        date: document.getElementById("date").value,
        budget: document.getElementById("budget").value ? Number(document.getElementById("budget").value) : null,
      };

      try {
        const res = await fetch("/api/leads", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!res.ok) throw new Error((await res.json()).error || "Something went wrong");
        document.getElementById("leadForm").style.display = "none";
        document.getElementById("doneMsg").style.display = "block";
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Send query";
      }
    });
  </script>
</body>
</html>
